<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sh1V — AI Assistant</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div class="app-shell">

    <!-- ============ TOP BAR ============ -->
    <header class="topbar">

      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" stroke="currentColor" stroke-width="1.5"/>
            <text x="12" y="15" text-anchor="middle" font-size="9" fill="currentColor" stroke="none">S</text>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Sh1v</span>
          <span class="brand-sub">
            AI Assistant
            <span class="status-dot" data-status="online"></span>
          </span>
        </div>
      </div>

      <div class="search-bar">
        <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search the web or enter a command…" autocomplete="off" />
        <button class="icon-btn search-send" id="search-send-btn" aria-label="Submit search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- dynamic: active state toggled by js3 -->
      <div class="scope-toggle" id="scope-toggle" data-active="internal">
        <button class="scope-btn" data-scope="internal">Internal</button>
        <button class="scope-btn" data-scope="external">External</button>
      </div>

      <button class="icon-btn menu-btn" id="menu-btn" aria-label="Open menu">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

    </header>

    <!-- ============ MAIN GRID ============ -->
    <main class="main-grid">

      <!-- ===== LEFT SIDEBAR ===== -->
      <aside class="sidebar-left">

        <section class="card panel-system-overview" id="panel-system-overview">
          <div class="panel-header">
            <h2><svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12H6L9 21L15 3L18 12H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> System Overview</h2>
            <button class="icon-btn collapse-btn" data-target="panel-system-overview" aria-label="Collapse">
              <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <div class="panel-body">
            <div class="overview-top">
              <!-- dynamic: cpu ring % drawn by js2 (conic-gradient or SVG stroke-dasharray) -->
              <div class="cpu-ring" id="cpu-ring" data-percent="0">
                <span class="cpu-ring-value" id="cpu-ring-value">--%</span>
                <span class="cpu-ring-label">CPU</span>
              </div>
              <div class="overview-stats">
                <span class="uptime-value" id="uptime-value">--:--:--</span>
                <span class="uptime-label">Uptime</span>
                <!-- dynamic: sparkline rendered by js2 into this svg -->
                <svg class="sparkline" id="cpu-sparkline" viewBox="0 0 100 30" preserveAspectRatio="none"></svg>
              </div>
            </div>

            <!-- dynamic: meter rows generated by js2 from data list -->
            <div class="meter-list" id="overview-meters"></div>
          </div>
        </section>

        <section class="card panel-performance" id="panel-performance">
          <div class="panel-header">
            <h2><svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 17L9 11L13 15L21 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Performance</h2>
            <button class="icon-btn collapse-btn" data-target="panel-performance" aria-label="Collapse">
              <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 15L12 9L6 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <div class="panel-body">
            <!-- dynamic: CPU/Memory/Disk bars generated by js2 -->
            <div class="meter-list meter-list--detailed" id="performance-meters"></div>

            <!-- dynamic: network speeds filled by js2 -->
            <div class="network-row">
              <span class="network-label">Network</span>
              <span class="network-values">
                <span class="net-down"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none"><path d="M12 4V18M12 18L6 12M12 18L18 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span id="net-down-value">--</span></span>
                <span class="net-up"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none"><path d="M12 20V6M12 6L6 12M12 6L18 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span id="net-up-value">--</span></span>
              </span>
            </div>
          </div>
        </section>

        

        


        

      </aside>

      <!-- ===== CENTER: CHAT ===== -->
      <section class="card panel-chat" id="panel-chat">
        <div class="panel-header">
          <h2><svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 11.5C21 16.75 16.97 21 12 21C10.5 21 9.1 20.65 7.85 20.02L3 21L4.3 16.7C3.47 15.27 3 13.65 3 11.5C3 6.25 7.03 2 12 2C16.97 2 21 6.25 21 11.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Chat Area</h2>
          <button class="icon-btn" id="chat-options-btn" aria-label="Chat options">
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
          </button>
        </div>

        <!-- scrollable region: only this div scrolls inside the chat card -->
        <!-- dynamic: every bubble/card here generated by js2 from the messages array in js1 -->
        <div class="chat-messages" id="chat-messages"></div>
      </section>

      <!-- ===== RIGHT: TERMINAL ===== -->
      <aside class="card panel-terminal" id="panel-terminal">
        <div class="panel-header">
          <h2><svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6L10 12L4 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Terminal</h2>
          <div class="panel-header-actions">
            <button class="icon-btn" id="terminal-clear-btn" aria-label="Clear terminal">
              <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 7H20M9 7V4H15V7M6 7L7 21H17L18 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn" id="terminal-options-btn" aria-label="Terminal options">
              <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>
            </button>
          </div>
        </div>

        <!-- scrollable region: only this div scrolls inside the terminal card -->
        <!-- dynamic: every line here generated by js2 from the log array in js1 -->
        <div class="terminal-log" id="terminal-log"></div>
      </aside>

    </main>

    <!-- ============ BOTTOM BAR ============ -->
    <footer class="bottombar">


      <section class="profile-card" id="profile-card">
          <div class="profile-avatar">
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 21C4 17 7.5 14 12 14C16.5 14 20 17 20 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </div>
          <div class="profile-text">
            <span class="profile-name">Shivam</span>
            <span class="profile-status">
              <span class="status-dot" data-status="online"></span>
              <span id="profile-status-text">Dev</span>
            </span>
          </div>
        </section>
      

      <div class="message-input">
        <button class="icon-btn attach-btn" id="attach-btn" aria-label="Add attachment">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <input type="text" id="message-input" placeholder="Type your message…" autocomplete="off" />
        <button class="icon-btn send-btn" id="message-send-btn" aria-label="Send message">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn mic-btn" id="mic-btn" aria-label="Voice input">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 15C13.66 15 15 13.66 15 12V6C15 4.34 13.66 3 12 3C10.34 3 9 4.34 9 6V12C9 13.66 10.34 15 12 15Z" stroke="currentColor" stroke-width="2"/><path d="M5 11V12C5 15.87 8.13 19 12 19C15.87 19 19 15.87 19 12V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 19V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="status-controls">
        <div class="status-pill" id="keyboard-status">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="6" width="20" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M6 10H6.01M10 10H10.01M14 10H14.01M18 10H18.01M6 14H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span class="status-pill-text">
            Keyboard
            <span class="status-pill-sub"><span class="status-dot" data-status="online"></span><span id="keyboard-status-text">ONLINE</span></span>
          </span>
        </div>

        <!-- dynamic: dropdown value + open state handled by js3 -->
        <div class="status-pill status-pill--dropdown" id="mode-status" data-open="false">
          <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg>
          <span class="status-pill-text">
            Mode
            <span class="status-pill-sub" id="mode-value-text">Hybrid</span>
          </span>
          <svg class="icon icon-chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <!-- dynamic: option list injected by js2 from modes array in js1 -->
          <ul class="mode-options" id="mode-options"></ul>
        </div>
      </div>

    </footer>

  </div>

  <script src="/static/js2-render.js"></script>
  <script src="/static/js1-state.js"></script>
  <script src="/static/js3-events.js"></script>
  <script src="/static/js4-api.js"></script>
</body>
</html>
